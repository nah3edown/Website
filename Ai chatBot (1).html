<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lumina AI — স্মার্ট NLP চ্যাটবট</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: radial-gradient(circle at 10% 30%, #1a1f2e, #0c0f17);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
  }

  .chat-container {
    width: 480px;
    max-width: 100%;
    height: 700px;
    background: rgba(30, 34, 48, 0.75);
    backdrop-filter: blur(18px);
    border-radius: 2.5rem;
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 1rem 1.5rem;
    background: rgba(20, 24, 36, 0.7);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #10a37f, #0e8c6d);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 4px 12px rgba(16, 163, 127, 0.3);
  }

  .header-info {
    flex: 1;
  }

  .header-info h2 {
    color: white;
    font-size: 1.2rem;
    font-weight: 600;
  }

  .header-info p {
    color: #a1a7bb;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #10a37f;
    border-radius: 50%;
    display: inline-block;
    box-shadow: 0 0 6px #10a37f;
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.4; transform: scale(0.9);}
    100% { opacity: 1; transform: scale(1.2);}
  }

  .chat-box {
    flex: 1;
    padding: 1.2rem 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    scroll-behavior: smooth;
  }

  .chat-box::-webkit-scrollbar {
    width: 5px;
  }
  .chat-box::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
  }
  .chat-box::-webkit-scrollbar-thumb {
    background: rgba(16,163,127,0.5);
    border-radius: 10px;
  }

  .message {
    max-width: 82%;
    padding: 0.8rem 1.1rem;
    border-radius: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.45;
    font-weight: 450;
    word-wrap: break-word;
    animation: fadeSlideUp 0.2s ease-out;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(8px);}
    to { opacity: 1; transform: translateY(0);}
  }

  .user {
    background: linear-gradient(120deg, #10a37f, #0d8e6c);
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 0.5rem;
    box-shadow: 0 6px 12px -6px rgba(0,0,0,0.3);
  }

  .bot {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
    border: 0.5px solid rgba(255,255,255,0.12);
    color: #f0f3fa;
    margin-right: auto;
    border-bottom-left-radius: 0.5rem;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.7rem 1.2rem;
    background: rgba(255,255,255,0.07);
    border-radius: 2rem;
    width: fit-content;
    backdrop-filter: blur(4px);
  }

  .typing-dot {
    width: 8px;
    height: 8px;
    background: #b1b9d0;
    border-radius: 50%;
    display: inline-block;
    animation: typingWave 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingWave {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-6px); opacity:1; background:#10a37f; }
  }

  .input-area {
    background: rgba(20,24,36,0.8);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 0.7rem 1rem;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-wrapper {
    flex: 1;
    background: rgba(0,0,0,0.35);
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: #10a37f;
    box-shadow: 0 0 0 2px rgba(16,163,127,0.2);
  }

  input {
    background: transparent;
    border: none;
    padding: 0.75rem 1rem;
    color: #f0f3fa;
    font-size: 0.9rem;
    width: 100%;
    outline: none;
    font-family: inherit;
  }
  input::placeholder {
    color: #8b93ab;
  }

  button {
    background: linear-gradient(100deg, #10a37f, #0e8565);
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    color: white;
    font-size: 1.2rem;
    box-shadow: 0 4px 10px rgba(16,163,127,0.3);
  }
  button:hover {
    transform: scale(1.03);
  }
  button:active {
    transform: scale(0.96);
  }

  @media (max-width: 500px) {
    body { padding: 0.8rem; }
    .chat-container { height: 95vh; border-radius: 1.8rem; }
    .message { max-width: 88%; }
  }
</style>
</head>
<body>
<div class="chat-container">
  <div class="header">
    <div class="avatar">🧠</div>
    <div class="header-info">
      <h2>TNC SmartBot</h2>
      <p><span class="status-dot"></span> Advanced AI · Intent aware</p>
    </div>
  </div>
  <div class="chat-box" id="chatBox">
    <div class="message bot">🤖 হ্যালো! আমি এখন NLP দিয়ে সজ্জিত। আমি শুধু মেলানো না, বুঝে উত্তর দিতে পারি। জিজ্ঞাসা করুন!</div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <input id="userInput" placeholder="বাংলা / ইংরেজি ..." onkeypress="if(event.key==='Enter') sendMessage()">

  </div>
</div>

<script>
// ======================= 🧠 অ্যাডভান্সড NLP লজিক (ইন্টেন্ট + কীওয়ার্ড + সিনোনিম) =======================
// বাংলা ও ইংরেজি — বট এখন বাক্যের অর্থ বোঝার চেষ্টা করে

// 1. ইন্টেন্ট ডেটাবেস: প্রতিটি ইন্টেন্টের সাথে ট্রিগার প্যাটার্ন, কীওয়ার্ড ও সিনোনিম সেট
const intentDB = [
  {
    name: "GREETING",

  },
  {
    name: "HOW_ARE_YOU",
    patterns: ["কেমন আছ", "কেমন আছেন", "how are you", "kemon acho", "kemon achhen", "কি খবর"],
    response: "আমি খুব ভালো আছি! ধন্যবাদ। আপনি কেমন আছেন? 💙"
  },
  {
    name: "BOT_NAME",
    patterns: ["তোমার নাম", "what is your name", "your name", "কে তুমি", "你是谁", "আপনার নাম"],
    response: "আমি TNC স্মার্টবট! আমার নাম NOOBXVAU 🤖। আমি আপনাকে সাহায্য করতে পেরে আনন্দিত।"
  },
  {
    name: "AI_QUESTION",
    patterns: ["ai কি", "what is ai", "ai kya", "আর্টিফিশিয়াল ইন্টেলিজেন্স", "কৃত্রিম বুদ্ধিমত্তা", "ai সম্পর্কে বলো"],
    keywords: ["ai","আর্টিফিশিয়াল","ইন্টেলিজেন্স","বুদ্ধিমত্তা","কৃত্রিম"],
    response: "🧠 AI (Artificial Intelligence) হলো মেশিন লার্নিং ও ডিপ লার্নিং প্রযুক্তি যা মেশিনকে মানুষের মতো চিন্তা, শিখতে ও সিদ্ধান্ত নিতে সাহায্য করে। উদাহরণ: ChatGPT,自动驾驶।"
  },
  {
    name: "HACKING",
    patterns: ["হ্যাকিং কি", "what is hacking", "hacking ki", "সাইবার আক্রমণ", "হ্যাকার"],
    keywords: ["হ্যাকিং","hacking","হ্যাকার","ক্র্যাকিং"],
    response: "⚡ Hacking মানে কম্পিউটার সিস্টেমে অনুমতি ছাড়া ঢুকা। তবে ইথিক্যাল হ্যাকিং নিরাপত্তার জন্য বৈধভাবে করা হয়।"
  },
  {
    name: "PROGRAMMING",
    patterns: ["প্রোগ্রামিং", "programming কি", "কোডিং", "coding", "সফটওয়্যার ডেভেলপমেন্ট"],
    keywords: ["প্রোগ্রামিং","programming","কোড","code","ডেভেলপ","development"],
    response: "💻 Programming হলো কম্পিউটারকে নির্দেশ দেওয়ার ভাষা। Python, JavaScript, Java খুব জনপ্রিয়। আপনি কোনটা শিখতে চান?"
  },
  {
    name: "BEST_LANG",
    patterns: ["best programming language", "সেরা ভাষা", "কোন ভাষা ভালো", "best language", "জনপ্রিয় প্রোগ্রামিং ভাষা"],
    keywords: ["সেরা","best","জনপ্রিয়","language","ভাষা"],
    response: "🏆 বর্তমানে Python সবচেয়ে জনপ্রিয় (ডাটা সায়েন্স, এআই), জাভাস্ক্রিপ্ট ওয়েবের জন্য, আর Java এন্টারপ্রাইজে। আপনার আগ্রহের উপর নির্ভর করে।"
  },
  {
    name: "THANKS",
    patterns: ["ধন্যবাদ", "thank you", "থ্যাংকস", "ধুর", "গ্রেসিয়াস"],
    response: "আপনাকে ধন্যবাদ! 😊 আর কিছু জানতে চান?"
  },
  {

    patterns: ["দুঃখিত", "sad", "মন খারাপ", "বিষণ্ণ", "খারাপ লাগছে"],
    keywords: ["দুঃখ","sad","খারাপ","বিষণ্ণ"],
    response: "ওহ, আমি দুঃখিত যে আপনি খারাপ অনুভব করছেন। 😔 কিছু বলতে চান? আমি শুনতে চাই।"
  },
  {
    name: "JOKE",
    patterns: ["মজার কথা", "জোক", "joke", "হাসির গল্প", "কৌতুক"],
    response: "😂 কেন প্রোগ্রামার ঠান্ডায় কাঁপে? কারণ তারা উইন্ডোজ বন্ধ করে দিয়েছে! (Windows close করে 😆)"
  },
  {
    name: "HELP",
    patterns: ["সাহায্য", "help", "কীভাবে", "guide", "কি করব", "বলো তো"],
    response: "🆘 আমি জানি: হ্যালো, কেমন আছ, AI, হ্যাকিং, প্রোগ্রামিং, সেরা ভাষা, ধন্যবাদ, জোক, আবহাওয়া ইত্যাদি। আপনি যা জিজ্ঞাসা করুন না কেন, আমি চেষ্টা করব!"
  },
  {
    name: "WEATHER",
    patterns: ["আবহাওয়া", "weather", "তাপমাত্রা", "বৃষ্টি", "গরম", "ঠান্ডা"],
    keywords: ["আবহাওয়া","weather","তাপমাত্রা","বৃষ্টি"],
    response: "☁️ আমি লাইভ আবহাওয়া জানি না, তবে বলুন কোন শহর? (আমি সাধারণ ধারণা দিতে পারি: ঢাকায় এখন বর্ষাকাল, ছাতা রাখুন!)"
  },
  {
    name: "CREATOR",
    patterns: ["কে বানিয়েছে", "তোমার নির্মাতা", "creator", "ডেভেলপার", "কে তৈরি করেছে"],
    response: "✨ আমাকে তৈরি করেছেন NOOBXVAU !! যিনি NOOB HACKER BD গ্ৰুপের প্রতিষ্ঠাতা এবং The Noob Coder you tube channel এর মালিক "
  },
  
    {
    name: "new qus",
    patterns: ["Test"],
    response: "New question add sucessful"
  }
  
  
  
];

// ফলের জন্য ডিফল্ট
const DEFAULT_RESPONSE = "😢 দুঃখিত, আমি বুঝতে পারিনি। তবে বলতে পারেন: হ্যালো, কেমন আছ, AI কি, হ্যাকিং, প্রোগ্রামিং, ধন্যবাদ, জোক, সাহায্য।";

// NLP ফাংশন: ইন্টেন্ট ডিটেক্ট (প্যাটার্ন + কীওয়ার্ড ওয়েটেড স্কোর)
function detectIntent(userMessage) {
  const msg = userMessage.toLowerCase().trim();
  let bestIntent = null;
  let highestScore = 0;
  
  for (const intent of intentDB) {
    let score = 0;
    // 1. exact pattern match + partial match (প্যাটার্ন ম্যাচিং)
    for (const pattern of intent.patterns) {
      const pat = pattern.toLowerCase();
      if (msg.includes(pat)) {
        score += 2.5;  // পাওয়ারফুল সিগন্যাল
      }
      // শব্দের দূরত্ব ভিত্তিক মিল? সরলতা: যদি শব্দাংশ মেলে
      if (pat.length > 2 && msg.length > 2) {
        if (msg.indexOf(pat) !== -1) score += 1.2;
      }
    }
    
    // 2. কীওয়ার্ড বেসড স্কোরিং (যদি ইন্টেন্টে keywords থাকে)
    if (intent.keywords) {
      for (const kw of intent.keywords) {
        const kwLow = kw.toLowerCase();
        if (msg.includes(kwLow)) {
          score += 1.8;
        }
        // বিশেষ বানান ভেরিয়েন্টের জন্য (Banglish/Bengali mix)
        if (kwLow === "ai" && (msg.includes("ai") || msg.includes("এআই"))) score += 1.5;
        if (kwLow === "হ্যাকিং" && (msg.includes("হ্যাক") || msg.includes("হেক") || msg.includes("ক্র্যাক"))) score += 1.5;
        if (kwLow === "প্রোগ্রামিং" && (msg.includes("প্রোগ্রাম") || msg.includes("কোডিং"))) score += 1.5;
      }
    }
    
    // 3. সিনোনিম অথবা এডভান্সড টোকেনাইজেশন: "আমি দুঃখিত" বোঝার জন্য sad intent এ boost
    if (intent.name === "FEELING_SAD" && (msg.includes("বিষন্ন") || msg.includes("বিষণ্ণ") || msg.includes("কান্না") || msg.includes("অসুখ"))) score += 1.2;
    if (intent.name === "THANKS" && (msg.includes("থ্যাঙ্কস") || msg.includes("থ্যাংক") || msg.includes("ধন্যবাদ"))) score += 1.2;
    if (intent.name === "GREETING" && (msg.includes("সুপ্রভাত") || msg.includes("শুভ সন্ধ্যা"))) score += 1.0;
    
    // Normalize: length factor (সংক্ষিপ্ত প্রশ্নে exact match এর গুরুত্ব বেশি)
    if (score > highestScore) {
      highestScore = score;
      bestIntent = intent;
    }
  }
  
  // থ্রেশহোল্ড: 1.2 এর কম হলে ডিফল্ট
  if (highestScore >= 1.2 && bestIntent) {
    return bestIntent.response;
  }
  
  // fallback: কিছু সাধারণ শব্দের দিকে নজর (যেমন hello pattern এ না গেলেও)
  if (msg.includes("হ্যালো") || msg.includes("hello") || msg.includes("হাই")) return "হ্যালো! কেমন চলছে? 😊";
  if (msg.includes("ধন্যবাদ") || msg.includes("thank")) return "আপনাকে অসংখ্য ধন্যবাদ! 🙏";
  if ((msg.includes("কি") && msg.includes("এআই")) || (msg.includes("what") && msg.includes("ai"))) 
    return "🧠 AI হলো কৃত্রিম বুদ্ধিমত্তা, যা মেশিন লার্নিং ও ডিপ লার্নিংয়ের মাধ্যমে কাজ করে।";
  
  return DEFAULT_RESPONSE;
}

// সহায়ক নরমালাইজ (পুরনো normalize function এর উন্নত সংস্করণ + NLP এর সাথে সামঞ্জস্য)
function advancedNormalize(text) {
  let processed = text.toLowerCase();
  // ইউনিকোড ও বাংলা ইংরেজি মিক্সড স্বাভাবিককরণ
  processed = processed.replace(/kemon|kaman/g,"কেমন");
  processed = processed.replace(/acho|aso/g,"আছ");
  processed = processed.replace(/helo/g,"hello");
  processed = processed.replace(/accha/g,"আচ্ছা");
  return processed;
}

// main responder: পুরনো responses অবজেক্টকে পাশে রেখেও NLP ফার্স্ট প্রায়োরিটি দিচ্ছি (তবে পুরনো কিছু প্রিয় উত্তর খারিজ না)
const legacyResponses = {
  "hello":"হ্যালো! কেমন আছেন?",
  "hi":"হাই 😊",
  "how are you":"আমি ভালো আছি, আপনি কেমন?",
  "your name":"আমি একটি chatbot 😄",
  "হ্যালো":"হ্যালো! কেমন আছেন?",
  "কেমন আছ":"আমি ভালো আছি 😊",
  "ai ki?":"AI (Artificial Intelligence) হলো এমন প্রযুক্তি যা মানুষের মতো চিন্তা করতে পারে।",
  "what is ai":"AI হলো মেশিনকে intelligent বানানোর একটি পদ্ধতি।",
  "hacking ki?":"Hacking মানে system access করা। Ethical hacking নিরাপত্তার জন্য করা হয়।",
  "programming":"Programming হলো code লিখে software তৈরি করা।",
  "best programming language":"Python, JavaScript, Java জনপ্রিয় language।",
  "default":"দুঃখিত, আমি বুঝতে পারিনি 😢"
};

function similarity(a,b){
  let same=0;
  for(let i=0;i<Math.min(a.length,b.length);i++){
    if(a[i]===b[i]) same++;
  }
  return same/Math.max(a.length,b.length);
}

function findLegacyMatch(msg){
  let best="default";
  let score=0;
  for(let key in legacyResponses){
    let s=similarity(msg,key);
    if(s>score){ score=s; best=key; }
  }
  return score>0.3 ? legacyResponses[best] : legacyResponses["default"];
}

// স্মার্ট রিপ্লাই জেনারেটর: NLP → লিগেসি ফলব্যাক (NLP আগে)
function getSmartReply(rawMessage){
  const normalizedMsg = advancedNormalize(rawMessage);
  // প্রথমে Advanced NLP intent detection
  const nlpReply = detectIntent(normalizedMsg);
  // যদি NLP ডিফল্ট (DEFAULT_RESPONSE) রিটার্ন করে এবং তা খুব জেনেরিক, তাহলে লিগেসি মেথড চেষ্টা করি
  if(nlpReply === DEFAULT_RESPONSE){
    const legacyReply = findLegacyMatch(normalizedMsg);
    if(legacyReply !== legacyResponses["default"]){
      return legacyReply;
    }
    // কিছু বাক্য যেখানে keyword missing কিন্তু অর্থপূর্ণ, যেমন "আমি ভালো আছি" 
    if(normalizedMsg.includes("ভালো") && (normalizedMsg.includes("আছি") || normalizedMsg.includes("আছেন"))){
      return "আমি আনন্দিত যে আপনি ভালো আছেন! 😊 কিছু জানতে চান?";
    }
    if(normalizedMsg.includes("শিখতে") || normalizedMsg.includes("জানতে চাই")){
      return "আপনি যা জানতে চান, জিজ্ঞাসা করুন! আমি প্রোগ্রামিং, AI, টেকনোলজি নিয়ে সাহায্য করব।";
    }
    return nlpReply;
  }
  return nlpReply;
}

// ------------------ UI এবং টাইপিং এফেক্ট (পুরনো লজিক সংরক্ষিত) ------------------
let typingElement = null;

function addMessage(text, sender) {
  const chatBox = document.getElementById("chatBox");
  const msgDiv = document.createElement("div");
  msgDiv.classList.add("message", sender);
  chatBox.appendChild(msgDiv);
  if (sender === "bot") {
    typeText(msgDiv, text);
  } else {
    msgDiv.innerText = text;
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}

function typeText(element, fullText) {
  let idx = 0;
  element.innerHTML = "";
  function typeChar() {
    if (idx < fullText.length) {
      element.innerHTML += fullText.charAt(idx);
      idx++;
      setTimeout(typeChar, 20);
    }
  }
  typeChar();
}

function showTyping() {
  if (typingElement) return;
  const chatBox = document.getElementById("chatBox");
  const typingDiv = document.createElement("div");
  typingDiv.id = "typing";
  typingDiv.classList.add("bot", "message");
  typingDiv.style.background = "rgba(255,255,255,0.06)";
  typingDiv.style.borderRadius = "2rem";
  typingDiv.style.width = "fit-content";
  typingDiv.innerHTML = `<div class="typing-indicator" style="background:transparent;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span style="margin-left:6px;">বিশ্লেষণ করছি...</span></div>`;
  chatBox.appendChild(typingDiv);
  typingElement = typingDiv;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  if (typingElement) {
    typingElement.remove();
    typingElement = null;
  }
}

async function sendMessage() {
  const inputField = document.getElementById("userInput");
  const userText = inputField.value.trim();
  if (!userText) return;
  
  addMessage(userText, "user");
  inputField.value = "";
  showTyping();
  
  setTimeout(() => {
    removeTyping();
    const botReply = getSmartReply(userText);
    addMessage(botReply, "bot");
  }, 700);
}

window.addEventListener("load", () => {
  document.getElementById("userInput").focus();
});
</script>
